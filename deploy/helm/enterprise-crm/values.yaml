# Default values for Enterprise CRM
# Override these for different environments

# Global settings
# global.imageRegistry is prepended to images.*.repository when non-empty
# (consumed by templates/gateway.yaml, agents.yaml, frontend.yaml).
# global.imagePullSecrets is rendered into pod specs when non-empty.
# global.domain is consumed by ingress hosts and CORS_ORIGINS in gateway env.
global:
  imageRegistry: ""
  imagePullSecrets: []
  domain: crm.example.com
  
# Namespace
namespace: crm

# Environment
environment: production

# Per-workload securityContext (G-H3: uid must match the USER in each Dockerfile)
securityContext:
  gateway:
    runAsUser: 1000   # node user on node:20-bullseye (gateway/Dockerfile)
  frontend:
    runAsUser: 1001   # nextjs user (frontend/Dockerfile)
  agents:
    runAsUser: 1001   # app user (agents/Dockerfile F4 multi-stage)

# ServiceAccount
# Consumed by templates/serviceaccount.yaml and the serviceAccountName helper in _helpers.tpl.
# When create=false, workloads fall back to the namespace "default" service account.
serviceAccount:
  create: true
  name: ""
  automount: false
  annotations: {}

# Frontend feature flag and presentation-only config
# Consumed by templates/frontend.yaml. Disabled here so existing installs that did not
# include the frontend workload are not surprised; enable for full topologies.
frontend:
  enabled: true

# Replica counts
replicaCount:
  frontend: 2
  gateway: 3
  agents: 2

# Images
images:
  # digest is the preferred immutable image reference (sha256:...).
  # When set, the template renders repository@digest.
  # When empty, the template falls back to tag (required).
  # CI (.github/workflows/ci-cd.yml) overrides digest via --set for
  # deploy-staging / deploy-production.  A plain `helm install` /
  # `helm template` without --set will fail with a `required` error
  # unless at least one of digest or tag is provided.
  frontend:
    repository: enterprise-crm/frontend
    digest: ""
    tag: ""
    pullPolicy: IfNotPresent
  gateway:
    repository: enterprise-crm/gateway
    digest: ""
    tag: ""
    pullPolicy: IfNotPresent
  agents:
    repository: enterprise-crm/agents
    digest: ""
    tag: ""
    pullPolicy: IfNotPresent

# Service configurations
services:
  frontend:
    type: ClusterIP
    port: 3000
  gateway:
    type: ClusterIP
    port: 4000
  agents:
    type: ClusterIP
    port: 5010

# Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    kubernetes.io/tls-acme: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: crm.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api/config
          pathType: Exact
          service: frontend
        - path: /api
          pathType: Prefix
          service: gateway
        - path: /ws
          pathType: Prefix
          service: gateway
  tls:
    - secretName: crm-tls
      hosts:
        - crm.example.com

# Resources
resources:
  frontend:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  gateway:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  agents:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi

# Autoscaling
autoscaling:
  enabled: true
  gateway:
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  agents:
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
  frontend:
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75

# PostgreSQL
postgresql:
  enabled: true
  auth:
    username: crm_user
    password: ""  # Use secret
    database: enterprise_crm
  primary:
    persistence:
      enabled: true
      size: 50Gi
  readReplicas:
    replicaCount: 2

# Redis
redis:
  enabled: true
  architecture: replication
  auth:
    enabled: true
    password: ""  # Use secret
  master:
    persistence:
      enabled: true
      size: 10Gi
  replica:
    replicaCount: 2

# Kafka
kafka:
  enabled: true
  replicaCount: 3
  persistence:
    enabled: true
    size: 50Gi
  zookeeper:
    replicaCount: 3
    persistence:
      enabled: true
      size: 10Gi

# External service endpoints
# Consumed by _helpers.tpl (postgresHost/redisHost/kafkaHost) when the corresponding
# bitnami subchart is disabled (enabled: false). Without these keys, disabling a
# subchart would render an empty host. They hold no secrets; real connection strings
# still come from the secrets.* references injected into workloads.
externalPostgresql:
  host: ""
externalRedis:
  host: ""
externalKafka:
  host: ""

# Ollama (optional GPU profile)
# Ollama is NOT a Chart.yaml dependency and this chart does NOT render an Ollama
# Deployment/Service.  When enabled, agents receive OLLAMA_URL / OLLAMA_MODEL env
# vars pointing at an out-of-band Ollama instance labelled app: ollama.
# Default disabled - Ollama requires GPU node pools and is not part of the base
# CRM topology.
ollama:
  enabled: false
  model: llama3.1

# Keycloak
keycloak:
  enabled: true
  auth:
    adminUser: admin
    adminPassword: ""  # Use secret
  replicaCount: 2

# Secrets (reference existing K8s secrets)
# P0-3: secretKeyRef `key` in gateway.yaml/agents.yaml MUST match the key name
# declared here. The referenced Secret must contain the FULL connection string
# (a usable DSN, e.g. postgresql://crm_user:...@host:5432/enterprise_crm) under
# this key, because the workload mounts it directly into DATABASE_URL / REDIS_URL.
# The key was renamed from `passwordKey` to `connectionStringKey` to reflect that
# the Secret holds a connection string, not a bare password. Update the actual
# K8s Secret's data key to match when deploying.
secrets:
  postgresql:
    existingSecret: crm-postgresql-secret
    connectionStringKey: connection-string
  redis:
    existingSecret: crm-redis-secret
    connectionStringKey: connection-string
  jwt:
    existingSecret: crm-jwt-secret
    secretKey: jwt-secret

# Pre-upgrade database migration Job (G-H6 / G3a)
# Runs scripts/migrate.sh via the database migration image (database/Dockerfile.migrate).
# The image must contain psql + Prisma CLI + database/migrations/**/*.sql.
# Digest is the preferred immutable image reference; tag is a required fallback.
# DATABASE_URL is sourced exclusively from the referenced Kubernetes Secret --
# no plaintext database URL is allowed in values files.
migration:
  enabled: true
  backoffLimit: 2
  activeDeadlineSeconds: 600
  image:
    repository: enterprise-crm/migrate
    digest: ""
    tag: ""
    pullPolicy: IfNotPresent
  database:
    existingSecret: crm-postgresql-secret
    urlKey: connection-string
  podSecurityContext:
    runAsUser: 1000   # node user on node:20-bullseye-slim (database/Dockerfile.migrate)
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Pod disruption budgets
podDisruptionBudget:
  gateway:
    minAvailable: 1
  agents:
    minAvailable: 1
  frontend:
    minAvailable: 1

# Node selectors
nodeSelector: {}

# Tolerations
tolerations: []

# NetworkPolicy
# Consumed by templates/networkpolicy.yaml. Disable if the cluster CNI does not
# support NetworkPolicy or if subcharts are disabled (external* services) and the
# pod selectors below no longer match in-namespace pods.
networkPolicy:
  enabled: true

# Affinity
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - gateway
          topologyKey: kubernetes.io/hostname
