apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "enterprise-crm.fullname" . }}-gateway
  namespace: {{ .Values.namespace }}
  labels:
    app: gateway
    {{- include "enterprise-crm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.gateway }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
        {{- include "enterprise-crm.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "enterprise-crm.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.securityContext.gateway.runAsUser }}
      containers:
        - name: gateway
          image: {{ include "enterprise-crm.image" (dict "root" . "image" .Values.images.gateway) }}
          imagePullPolicy: {{ .Values.images.gateway.pullPolicy }}
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: GATEWAY_PORT
              value: "4000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.postgresql.existingSecret }}
                  key: {{ .Values.secrets.postgresql.connectionStringKey }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.redis.existingSecret }}
                  key: {{ .Values.secrets.redis.connectionStringKey }}
            - name: KAFKA_BROKERS
              value: "{{ include "enterprise-crm.kafkaHost" . }}:9092"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.jwt.existingSecret }}
                  key: {{ .Values.secrets.jwt.secretKey }}
            - name: OPA_URL
              value: "http://{{ include "enterprise-crm.fullname" . }}-opa:8181"
            - name: CORS_ORIGINS
              value: "https://{{ .Values.global.domain }}"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources.gateway | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "enterprise-crm.fullname" . }}-gateway
  namespace: {{ .Values.namespace }}
  labels:
    app: gateway
spec:
  type: {{ .Values.services.gateway.type }}
  ports:
    - port: {{ .Values.services.gateway.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: gateway
---
{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "enterprise-crm.fullname" . }}-gateway
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "enterprise-crm.fullname" . }}-gateway
  minReplicas: {{ .Values.autoscaling.gateway.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.gateway.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.gateway.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.gateway.targetMemoryUtilizationPercentage }}
{{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "enterprise-crm.fullname" . }}-gateway
  namespace: {{ .Values.namespace }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.gateway.minAvailable }}
  selector:
    matchLabels:
      app: gateway
