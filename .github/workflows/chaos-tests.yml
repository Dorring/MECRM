name: Chaos Tests (Isolated)

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 3 * * *"

jobs:
  chaos:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r agents/requirements.txt
          python -m pip install pytest pytest-asyncio

      - name: Start isolated stack
        run: |
          docker compose -f docker-compose.chaos.yml up -d --build

      - name: Run chaos suite
        env:
          CHAOS_TESTS_ENABLED: "true"
          CHAOS_ENVIRONMENT: "ci"
          CHAOS_DATABASE_URL: "postgresql://crm_user:crm_password@localhost:5432/enterprise_crm"
          CHAOS_KAFKA_BROKERS: "localhost:9094"
          CHAOS_REDIS_URL: "redis://localhost:6379"
        run: |
          pytest agents/tests/chaos -v

      - name: Upload chaos reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-reports
          path: reports/chaos
          if-no-files-found: warn

      - name: Tear down stack
        if: always()
        run: |
          docker compose -f docker-compose.chaos.yml down -v
