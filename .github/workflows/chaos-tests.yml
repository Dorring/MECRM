name: Chaos Tests (Isolated)

# Only trigger manually (workflow_dispatch).  Scheduled chaos runs were
# removed in D3: they produced silent exit 2 failures from the inline
# raw-SQL migration runner without surfacing diagnostics.  Re-enable
# schedule only after chaos-migrations has been validated end-to-end.

on:
  workflow_dispatch: {}

jobs:
  chaos:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Only allow manual dispatch — no auto-fire on main push either.
    # The guard was previously if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main',
    # which caught schedule runs but also pulled in any push to main.
    # Now that schedule is removed, this guard is a no-op safety backstop.
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r agents/requirements.txt
          python -m pip install pytest pytest-asyncio

      - name: Start isolated stack
        run: |
          docker compose -f docker-compose.chaos.yml up -d --build

      - name: Show service health (diagnostics)
        if: always()
        run: |
          echo "=== docker compose ps ==="
          docker compose -f docker-compose.chaos.yml ps
          echo ""
          echo "=== chaos-migrations logs ==="
          docker compose -f docker-compose.chaos.yml logs --tail=200 chaos-migrations || true
          echo ""
          echo "=== postgres logs ==="
          docker compose -f docker-compose.chaos.yml logs --tail=50 postgres || true

      - name: Run chaos suite
        env:
          CHAOS_TESTS_ENABLED: "true"
          CHAOS_ENVIRONMENT: "ci"
          CHAOS_DATABASE_URL: "postgresql://crm_user:crm_password@localhost:5432/enterprise_crm"
          CHAOS_KAFKA_BROKERS: "localhost:9094"
          CHAOS_REDIS_URL: "redis://localhost:6379"
        run: |
          pytest agents/tests/chaos -v

      - name: Show agent and replay diagnostics on failure
        if: failure()
        run: |
          echo "=== agents logs ==="
          docker compose -f docker-compose.chaos.yml logs --tail=200 agents || true
          echo ""
          echo "=== replay-service logs ==="
          docker compose -f docker-compose.chaos.yml logs --tail=200 replay-service || true
          echo ""
          echo "=== kafka logs ==="
          docker compose -f docker-compose.chaos.yml logs --tail=50 kafka || true

      - name: Upload chaos reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: chaos-reports
          path: reports/chaos
          if-no-files-found: warn

      - name: Tear down stack
        if: always()
        run: |
          docker compose -f docker-compose.chaos.yml down -v
