name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # Lint and type check
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [gateway, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            npm ci && break || sleep $((i * 15))
          done
        working-directory: ${{ matrix.project }}

      - name: Run linter
        run: npm run lint
        working-directory: ${{ matrix.project }}

      - name: Type check
        run: npm run build
        working-directory: ${{ matrix.project }}

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff mypy
          pip install -r requirements.txt
        working-directory: agents

      - name: Run ruff
        run: ruff check .
        working-directory: agents

      - name: Run mypy
        run: mypy src --ignore-missing-imports
        working-directory: agents

  # Static schema / contract validation
  validate-schemas:
    name: Validate Event Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install jsonschema
        run: python -m pip install jsonschema

      - name: Validate CloudEvents schemas
        run: |
          set -e
          shopt -s globstar nullglob
          found=0
          for f in schemas/events/**/*.json; do
            found=1
            python -c "import json,sys; json.load(open(sys.argv[1]))" "$f"
          done
          if [ "$found" -eq 0 ]; then
            echo "No event schemas found in schemas/events/**/*.json" >&2
            exit 1
          fi

  # Unit tests
  test-gateway:
    name: Test Gateway
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # GitHub Actions service containers do not support a command/args field.
      # Start Redis explicitly so its durable configuration is part of the
      # container command and therefore survives `docker restart`.
      - name: Start Redis with AOF/noeviction
        run: |
          docker run --detach \
            --name mecrm-ci-redis \
            --publish 6379:6379 \
            --health-cmd "redis-cli ping" \
            --health-interval 1s \
            --health-timeout 3s \
            --health-retries 30 \
            redis:7 \
            redis-server \
            --appendonly yes \
            --appendfsync always \
            --maxmemory-policy noeviction

          for i in $(seq 1 60); do
            STATUS="$(docker inspect --format '{{.State.Health.Status}}' mecrm-ci-redis)"
            if [ "$STATUS" = "healthy" ]; then
              exit 0
            fi
            if [ "$STATUS" = "unhealthy" ]; then
              docker logs mecrm-ci-redis
              exit 1
            fi
            sleep 1
          done

          docker logs mecrm-ci-redis
          echo "Redis did not become healthy in time" >&2
          exit 1

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            npm ci && break || sleep $((i * 15))
          done
        working-directory: gateway

      - name: Apply migrations via single runner
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          bash ./scripts/migrate.sh
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          CRM_APP_PASSWORD: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: test_db
          GATEWAY_DIR: ./gateway

      - name: Verify Redis AOF/noeviction (set at container startup)
        run: |
          [ "$(docker exec mecrm-ci-redis redis-cli CONFIG GET appendonly | tail -1)" = "yes" ]
          [ "$(docker exec mecrm-ci-redis redis-cli CONFIG GET appendfsync | tail -1)" = "always" ]
          [ "$(docker exec mecrm-ci-redis redis-cli CONFIG GET maxmemory-policy | tail -1)" = "noeviction" ]

      - name: Run tests
        run: npm test -- --coverage --detectOpenHandles
        working-directory: gateway
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
          CRM_TEST_REQUIRE_DB: 1
          CRM_REDIS_AVAILABLE: 1

      - name: Run Redis durability tests (restart test, runInBand)
        run: npx jest --config jest.durability.config.js --runInBand --detectOpenHandles
        working-directory: gateway
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
          CRM_REDIS_AVAILABLE: 1
          CRM_CAN_RESTART_REDIS: 1
          CRM_REDIS_CONTAINER: mecrm-ci-redis

      - name: Stop Redis test container
        if: always()
        run: docker rm --force mecrm-ci-redis || true

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: gateway/coverage/lcov.info
          flags: gateway

  test-agents:
    name: Test Agents
    runs-on: ubuntu-latest
    needs: lint-python
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install gateway dependencies
        run: |
          for i in 1 2 3; do
            npm ci && break || sleep $((i * 15))
          done
        working-directory: gateway

      - name: Apply migrations via single runner
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          bash ./scripts/migrate.sh
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          CRM_APP_PASSWORD: crm_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: test_db
          GATEWAY_DIR: ./gateway

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install agents dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov
        working-directory: agents

      - name: Run tests
        run: pytest --cov=src --cov-report=xml
        working-directory: agents
        env:
          ADMIN_DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          DATABASE_URL: postgresql://crm_app:crm_password@localhost:5432/test_db

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: agents/coverage.xml
          flags: agents

  migration-runner:
    name: Migration Runner Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install gateway dependencies
        run: |
          for i in 1 2 3; do
            npm ci && break || sleep $((i * 15))
          done
        working-directory: gateway

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run migration runner regression tests
        run: pytest tests/infra/test_migrate_runner.py -v
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          CRM_APP_PASSWORD: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: test_db

      - name: Show diagnostics on failure
        if: failure()
        run: |
          echo "--- pg_stat_activity advisory locks ---"
          psql "$DATABASE_URL" -c "SELECT a.pid, a.application_name, a.state, a.query, l.granted FROM pg_locks l JOIN pg_stat_activity a ON a.pid = l.pid WHERE l.locktype = 'advisory' AND l.objid = 405011;" || true
          echo "--- pg_stat_activity mecrm-migration-lock backends ---"
          psql "$DATABASE_URL" -c "SELECT pid, state, query FROM pg_stat_activity WHERE application_name = 'mecrm-migration-lock';" || true
          echo "--- migrate runner output not captured per-test; rerun manually ---"

  # Compose config validation and local smoke test.
  # Mirrors the manual Docker acceptance steps in docs/review-findings-batch1.md.
  # This ensures the RLS/SQL migration path, secret hygiene, and the real
  # authenticated write/read smoke test are exercised on every PR.
  smoke:
    name: Compose Config + Smoke Test
    runs-on: ubuntu-latest
    needs: [test-gateway, test-agents, test-policies, migration-runner]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate .env
        run: |
          cp .env.example .env
          # Replace weak defaults with random values.
          # Use '#' as sed delimiter because base64 output may contain '/'.
          sed -i "s#^JWT_SECRET=.*#JWT_SECRET=$(openssl rand -base64 48)#" .env
          sed -i "s#^KEYCLOAK_ADMIN_PASSWORD=.*#KEYCLOAK_ADMIN_PASSWORD=$(openssl rand -base64 24)#" .env
          sed -i "s#^GRAFANA_ADMIN_PASSWORD=.*#GRAFANA_ADMIN_PASSWORD=$(openssl rand -base64 24)#" .env

      - name: Validate compose config
        run: |
          docker compose config >/dev/null
          docker compose config | grep -E 'supersecret|KEYCLOAK_ADMIN_PASSWORD=admin|GF_SECURITY_ADMIN_PASSWORD=admin' && { echo "FAIL: leaked default secrets"; exit 1; } || echo "OK: no leaked defaults"

      - name: Full migration sequence (Prisma + SQL 01-11 + RLS check)
        run: |
          docker compose up -d postgres
          docker compose --profile migrate run --rm migrate

      - name: Run gateway tests against migrated DB
        run: |
          docker compose --profile test run --rm test-gateway

      - name: Start stack and run real smoke test
        run: |
          # Start only the services needed by smoke; kafka-init is explicit because
          # gateway depends on completed topic initialization.
          docker compose up -d --wait postgres redis kafka kafka-init opa gateway
          docker compose --profile smoke-test run --rm smoke-test

      - name: Show service diagnostics on failure
        if: failure()
        run: |
          docker compose ps
          echo "--- migrate logs ---"
          docker compose logs --tail=200 migrate || true
          echo "--- gateway logs ---"
          docker compose logs --tail=200 gateway || true
          echo "--- kafka logs ---"
          docker compose logs --tail=200 kafka || true
          echo "--- postgres logs ---"
          docker compose logs --tail=100 postgres || true
          echo "--- opa logs ---"
          docker compose logs --tail=100 opa || true
          echo "--- smoke-test logs ---"
          docker compose logs --tail=100 smoke-test || true

  # C4 WebSocket same-origin proxy smoke test.
  # Builds gateway + frontend, starts the full edge-proxy topology, and runs
  # the ws-proxy-test.js script to verify:
  #   - /ws upgrade through nginx -> Gateway (101 Switching Protocols)
  #   - valid ticket -> { type: "connected" }
  #   - consumed ticket -> close 4401
  #   - invalid ticket -> close 4401
  ws-proxy-smoke:
    name: WS Proxy Smoke Test
    runs-on: ubuntu-latest
    needs: [lint, lint-python]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate .env
        run: |
          cp .env.example .env
          sed -i "s#^JWT_SECRET=.*#JWT_SECRET=$(openssl rand -base64 48)#" .env
          sed -i "s#^KEYCLOAK_ADMIN_PASSWORD=.*#KEYCLOAK_ADMIN_PASSWORD=$(openssl rand -base64 24)#" .env
          sed -i "s#^GRAFANA_ADMIN_PASSWORD=.*#GRAFANA_ADMIN_PASSWORD=$(openssl rand -base64 24)#" .env

      - name: Validate compose config
        run: |
          docker compose config >/dev/null
          docker compose config | grep -E 'supersecret|KEYCLOAK_ADMIN_PASSWORD=admin' && { echo "FAIL: leaked default secrets"; exit 1; } || echo "OK: no leaked defaults"

      - name: Start minimal topology for WS proxy test
        run: |
          docker compose up -d --wait postgres redis kafka kafka-init opa gateway frontend frontend-proxy

      - name: Run full migration sequence
        run: |
          docker compose --profile migrate run --rm migrate

      - name: Run WS proxy smoke test
        run: |
          docker compose --profile ws-proxy-test run --rm ws-proxy-test

      - name: Show diagnostics on failure
        if: failure()
        run: |
          docker compose ps
          echo "--- frontend-proxy logs ---"
          docker compose logs --tail=200 frontend-proxy || true
          echo "--- frontend logs ---"
          docker compose logs --tail=200 frontend || true
          echo "--- gateway logs ---"
          docker compose logs --tail=200 gateway || true
          echo "--- postgres logs ---"
          docker compose logs --tail=100 postgres || true
          echo "--- ws-proxy-test logs ---"
          docker compose logs --tail=100 ws-proxy-test || true

  # OPA policy tests
  test-policies:
    name: Test OPA Policies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: 0.70.0

      - name: Run policy tests
        run: opa test policies/ -v

  # Helm chart validation (lint + render). Runs on every push/PR so chart
  # regressions surface before deploy. The staging/production values files are
  # created by the Helm phase; both must exist before this job can fully pass
  # on a release branch.
  helm-lint:
    name: Helm Lint & Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v5

      # P0-4: Chart.yaml declares bitnami subchart dependencies (postgresql, redis,
      # kafka, keycloak). `helm lint` and `helm template` fail with "found in
      # Chart.yaml, but missing in charts/" unless dependencies are fetched first.
      # `helm dependency build` populates charts/ from Chart.yaml (and writes
      # Chart.lock). It is idempotent and safe to run on every push/PR.
      - name: Build chart dependencies
        run: helm dependency build deploy/helm/enterprise-crm

      # E1: image tags are intentionally empty in values files.  Templates use
      # `required` to fail-fast when no tag is set, so CI must always pass an
      # explicit tag (the actual commit SHA is injected by deploy jobs; here we
      # use a ci-test sentinel).
      - name: Lint chart (tag mode)
        run: |
          helm lint deploy/helm/enterprise-crm \
            --set images.frontend.tag=ci-test \
            --set images.gateway.tag=ci-test \
            --set images.agents.tag=ci-test \
            --set migration.image.tag=ci-test

      - name: Render default template (tag mode)
        run: |
          helm template enterprise-crm deploy/helm/enterprise-crm \
            --set images.frontend.tag=ci-test \
            --set images.gateway.tag=ci-test \
            --set images.agents.tag=ci-test \
            --set migration.image.tag=ci-test \
            --namespace crm-default > /tmp/rendered-default.yaml
          echo "Rendered $(wc -l < /tmp/rendered-default.yaml) lines"

      # -- Group G G1: validate digest-mode rendering.  When digest is set the
      #    enterprise-crm.image helper renders repository@digest.  This verifies
      #    the digest rendering path does not produce malformed image references
      #    (e.g. double registry prefix, missing @, wrong repository).

      - name: Lint chart (digest mode)
        env:
          DIGEST_REPO: ghcr.io/dorring/mecrm
          DIGEST_GW: sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          DIGEST_FE: sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          DIGEST_AG: sha256:cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
          DIGEST_MG: sha256:dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd
        run: |
          helm lint deploy/helm/enterprise-crm \
            --set-string images.gateway.repository="${DIGEST_REPO}/gateway" \
            --set-string images.gateway.digest="${DIGEST_GW}" \
            --set-string images.frontend.repository="${DIGEST_REPO}/frontend" \
            --set-string images.frontend.digest="${DIGEST_FE}" \
            --set-string images.agents.repository="${DIGEST_REPO}/agents" \
            --set-string images.agents.digest="${DIGEST_AG}" \
            --set-string migration.image.repository="${DIGEST_REPO}/migrate" \
            --set-string migration.image.digest="${DIGEST_MG}"

      - name: Render default template (digest mode)
        env:
          DIGEST_REPO: ghcr.io/dorring/mecrm
          DIGEST_GW: sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          DIGEST_FE: sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          DIGEST_AG: sha256:cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
          DIGEST_MG: sha256:dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd
        run: |
          helm template enterprise-crm deploy/helm/enterprise-crm \
            --set-string images.gateway.repository="${DIGEST_REPO}/gateway" \
            --set-string images.gateway.digest="${DIGEST_GW}" \
            --set-string images.frontend.repository="${DIGEST_REPO}/frontend" \
            --set-string images.frontend.digest="${DIGEST_FE}" \
            --set-string images.agents.repository="${DIGEST_REPO}/agents" \
            --set-string images.agents.digest="${DIGEST_AG}" \
            --set-string migration.image.repository="${DIGEST_REPO}/migrate" \
            --set-string migration.image.digest="${DIGEST_MG}" \
            --namespace crm-default > /tmp/rendered-digest.yaml
          echo "Rendered $(wc -l < /tmp/rendered-digest.yaml) lines"

          # G1: verify digest-mode rendering produces correct image references
          grep -qE 'ghcr\.io/dorring/mecrm/gateway@sha256:' /tmp/rendered-digest.yaml || {
            echo "FATAL: digest-mode render missing ghcr.io/dorring/mecrm/gateway@sha256:" >&2; exit 1;
          }
          grep -qE 'ghcr\.io/dorring/mecrm/frontend@sha256:' /tmp/rendered-digest.yaml || {
            echo "FATAL: digest-mode render missing ghcr.io/dorring/mecrm/frontend@sha256:" >&2; exit 1;
          }
          grep -qE 'ghcr\.io/dorring/mecrm/agents@sha256:' /tmp/rendered-digest.yaml || {
            echo "FATAL: digest-mode render missing ghcr.io/dorring/mecrm/agents@sha256:" >&2; exit 1;
          }

          # G3a: verify migration image renders with digest
          grep -qE 'ghcr\.io/dorring/mecrm/migrate@sha256:' /tmp/rendered-digest.yaml || {
            echo "FATAL: digest-mode render missing ghcr.io/dorring/mecrm/migrate@sha256:" >&2; exit 1;
          }

          # G1: verify NO stale enterprise-crm/ prefix leaked into digest rendering
          if grep -q 'enterprise-crm/gateway@sha256:\|enterprise-crm/frontend@sha256:\|enterprise-crm/agents@sha256:\|enterprise-crm/migrate@sha256:' /tmp/rendered-digest.yaml; then
            echo "FATAL: digest-mode render contains enterprise-crm/{service}@sha256 (default repo instead of ghcr.io)" >&2; exit 1;
          fi
          echo "OK: all services including migration render correct ghcr.io/...@sha256:... in digest mode"

      - name: Lint staging values if present
        run: |
          if [ -f deploy/helm/enterprise-crm/values-staging.yaml ]; then
            helm lint deploy/helm/enterprise-crm \
              --values deploy/helm/enterprise-crm/values-staging.yaml \
              --set images.frontend.tag=ci-test \
              --set images.gateway.tag=ci-test \
              --set images.agents.tag=ci-test \
              --set migration.image.tag=ci-test
          else
            echo "values-staging.yaml not present yet; skipping staging lint (see docs/project-optimization-plan.md Phase 4)."
          fi

      # P0-4: also render (template) the staging values, not just lint. `helm template`
      # catches rendering errors that `helm lint` (a manifest/structure check) does not,
      # e.g. bad {{ }} expressions that only break when a value is actually substituted.
      - name: Render staging template if present (tag mode)
        run: |
          if [ -f deploy/helm/enterprise-crm/values-staging.yaml ]; then
            helm template enterprise-crm deploy/helm/enterprise-crm \
              --values deploy/helm/enterprise-crm/values-staging.yaml \
              --set images.frontend.tag=ci-test \
              --set images.gateway.tag=ci-test \
              --set images.agents.tag=ci-test \
              --set migration.image.tag=ci-test \
              --namespace crm-staging > /tmp/rendered-staging.yaml
            echo "Rendered $(wc -l < /tmp/rendered-staging.yaml) lines"
          else
            echo "values-staging.yaml not present yet; skipping staging template."
          fi

      - name: Render staging template if present (digest mode)
        env:
          DIGEST_REPO: ghcr.io/dorring/mecrm
          DIGEST_GW: sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          DIGEST_FE: sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          DIGEST_AG: sha256:cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
          DIGEST_MG: sha256:dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd
        run: |
          if [ -f deploy/helm/enterprise-crm/values-staging.yaml ]; then
            helm template enterprise-crm deploy/helm/enterprise-crm \
              --values deploy/helm/enterprise-crm/values-staging.yaml \
              --set-string images.gateway.repository="${DIGEST_REPO}/gateway" \
              --set-string images.gateway.digest="${DIGEST_GW}" \
              --set-string images.frontend.repository="${DIGEST_REPO}/frontend" \
              --set-string images.frontend.digest="${DIGEST_FE}" \
              --set-string images.agents.repository="${DIGEST_REPO}/agents" \
              --set-string images.agents.digest="${DIGEST_AG}" \
              --set-string migration.image.repository="${DIGEST_REPO}/migrate" \
              --set-string migration.image.digest="${DIGEST_MG}" \
              --namespace crm-staging > /tmp/rendered-staging-digest.yaml
            echo "Rendered $(wc -l < /tmp/rendered-staging-digest.yaml) lines"

            grep -qE 'ghcr\.io/dorring/mecrm/gateway@sha256:' /tmp/rendered-staging-digest.yaml || {
              echo "FATAL: staging digest-mode render missing ghcr.io/dorring/mecrm/gateway@sha256:" >&2; exit 1;
            }
            grep -qE 'ghcr\.io/dorring/mecrm/frontend@sha256:' /tmp/rendered-staging-digest.yaml || {
              echo "FATAL: staging digest-mode render missing ghcr.io/dorring/mecrm/frontend@sha256:" >&2; exit 1;
            }
            grep -qE 'ghcr\.io/dorring/mecrm/agents@sha256:' /tmp/rendered-staging-digest.yaml || {
              echo "FATAL: staging digest-mode render missing ghcr.io/dorring/mecrm/agents@sha256:" >&2; exit 1;
            }
            grep -qE 'ghcr\.io/dorring/mecrm/migrate@sha256:' /tmp/rendered-staging-digest.yaml || {
              echo "FATAL: staging digest-mode render missing ghcr.io/dorring/mecrm/migrate@sha256:" >&2; exit 1;
            }
            if grep -q 'enterprise-crm/gateway@sha256:\|enterprise-crm/frontend@sha256:\|enterprise-crm/agents@sha256:\|enterprise-crm/migrate@sha256:' /tmp/rendered-staging-digest.yaml; then
              echo "FATAL: staging digest-mode render contains enterprise-crm/{service}@sha256 (default repo instead of ghcr.io)" >&2; exit 1;
            fi
            echo "OK: staging digest-mode render correct"
          else
            echo "values-staging.yaml not present yet; skipping staging digest template."
          fi

      - name: Lint production values if present
        run: |
          if [ -f deploy/helm/enterprise-crm/values-production.yaml ]; then
            helm lint deploy/helm/enterprise-crm \
              --values deploy/helm/enterprise-crm/values-production.yaml \
              --set images.frontend.tag=ci-test \
              --set images.gateway.tag=ci-test \
              --set images.agents.tag=ci-test \
              --set migration.image.tag=ci-test
          else
            echo "values-production.yaml not present yet; skipping production lint (see docs/project-optimization-plan.md Phase 4)."
          fi

      - name: Render production template if present (tag mode)
        run: |
          if [ -f deploy/helm/enterprise-crm/values-production.yaml ]; then
            helm template enterprise-crm deploy/helm/enterprise-crm \
              --values deploy/helm/enterprise-crm/values-production.yaml \
              --set images.frontend.tag=ci-test \
              --set images.gateway.tag=ci-test \
              --set images.agents.tag=ci-test \
              --set migration.image.tag=ci-test \
              --namespace crm-production > /tmp/rendered-production.yaml
            echo "Rendered $(wc -l < /tmp/rendered-production.yaml) lines"
          else
            echo "values-production.yaml not present yet; skipping production template."
          fi

      - name: Render production template if present (digest mode)
        env:
          DIGEST_REPO: ghcr.io/dorring/mecrm
          DIGEST_GW: sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          DIGEST_FE: sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          DIGEST_AG: sha256:cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
          DIGEST_MG: sha256:dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd
        run: |
          if [ -f deploy/helm/enterprise-crm/values-production.yaml ]; then
            helm template enterprise-crm deploy/helm/enterprise-crm \
              --values deploy/helm/enterprise-crm/values-production.yaml \
              --set-string images.gateway.repository="${DIGEST_REPO}/gateway" \
              --set-string images.gateway.digest="${DIGEST_GW}" \
              --set-string images.frontend.repository="${DIGEST_REPO}/frontend" \
              --set-string images.frontend.digest="${DIGEST_FE}" \
              --set-string images.agents.repository="${DIGEST_REPO}/agents" \
              --set-string images.agents.digest="${DIGEST_AG}" \
              --set-string migration.image.repository="${DIGEST_REPO}/migrate" \
              --set-string migration.image.digest="${DIGEST_MG}" \
              --namespace crm-production > /tmp/rendered-production-digest.yaml
            echo "Rendered $(wc -l < /tmp/rendered-production-digest.yaml) lines"

            grep -qE 'ghcr\.io/dorring/mecrm/gateway@sha256:' /tmp/rendered-production-digest.yaml || {
              echo "FATAL: production digest-mode render missing ghcr.io/dorring/mecrm/gateway@sha256:" >&2; exit 1;
            }
            grep -qE 'ghcr\.io/dorring/mecrm/frontend@sha256:' /tmp/rendered-production-digest.yaml || {
              echo "FATAL: production digest-mode render missing ghcr.io/dorring/mecrm/frontend@sha256:" >&2; exit 1;
            }
            grep -qE 'ghcr\.io/dorring/mecrm/agents@sha256:' /tmp/rendered-production-digest.yaml || {
              echo "FATAL: production digest-mode render missing ghcr.io/dorring/mecrm/agents@sha256:" >&2; exit 1;
            }
            grep -qE 'ghcr\.io/dorring/mecrm/migrate@sha256:' /tmp/rendered-production-digest.yaml || {
              echo "FATAL: production digest-mode render missing ghcr.io/dorring/mecrm/migrate@sha256:" >&2; exit 1;
            }
            if grep -q 'enterprise-crm/gateway@sha256:\|enterprise-crm/frontend@sha256:\|enterprise-crm/agents@sha256:\|enterprise-crm/migrate@sha256:' /tmp/rendered-production-digest.yaml; then
              echo "FATAL: production digest-mode render contains enterprise-crm/{service}@sha256 (default repo instead of ghcr.io)" >&2; exit 1;
            fi
            echo "OK: production digest-mode render correct"
          else
            echo "values-production.yaml not present yet; skipping production digest template."
          fi

  # Build and push images
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test-gateway, test-agents, test-policies, validate-schemas, helm-lint, smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read
    strategy:
      matrix:
        include:
          - project: gateway
            dockerfile: gateway/Dockerfile
            context: gateway
          - project: frontend
            dockerfile: frontend/Dockerfile
            context: frontend
          - project: agents
            dockerfile: agents/Dockerfile
            context: agents
          - project: migrate
            dockerfile: database/Dockerfile.migrate
            context: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.project }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Mark build start time
        id: build-start
        run: date -u +%s > /tmp/build-start-epoch

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # -- Group G G2 PR1: SBOM + provenance attestation --
          sbom: true
          provenance: true

      - name: Record build duration
        id: build-duration
        if: success()
        run: |
          START=$(cat /tmp/build-start-epoch)
          END=$(date -u +%s)
          DURATION=$((END - START))
          echo "duration_seconds=${DURATION}" >> "$GITHUB_OUTPUT"

      # Publish the immutable image digest so deploy jobs can resolve the
      # exact bytes that were built, instead of the mutable sha tag.
      # Phase 4 CI/CD requirement: deploys must reference a digest, not a tag.
      - name: Export image digest
        id: export-digest
        env:
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.project }}
        run: |
          DIGEST="${{ steps.build-push.outputs.digest }}"
          IMAGE_NAME="$(printf '%s' "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          test -n "${DIGEST}"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE_NAME}@${DIGEST}" >> "$GITHUB_OUTPUT"

      # -- Group F F3: collect image metrics and upload as CI artifact -----
      - name: Validate metrics script
        run: bash -n scripts/ci-inspect-image.sh

      - name: Collect image metrics
        id: collect-metrics
        env:
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.project }}
        run: |
          IMAGE_FULL="$(printf '%s' "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')@${{ steps.build-push.outputs.digest }}"
          bash scripts/ci-inspect-image.sh \
            --image "${IMAGE_FULL}" \
            --output "image-metrics-${{ matrix.project }}.json" \
            --build-duration-seconds "${{ steps.build-duration.outputs.duration_seconds }}"

      - name: Upload image metrics artifact
        uses: actions/upload-artifact@v7
        with:
          name: image-metrics-${{ matrix.project }}
          path: image-metrics-${{ matrix.project }}.json
          if-no-files-found: error
          retention-days: 30

      # -- Group G G1: upload per-project digest artifact for aggregation -----
      - name: Write digest artifact
        id: digest-artifact
        env:
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.project }}
        run: |
          IMAGE_FULL="$(printf '%s' "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          DIGEST="${{ steps.build-push.outputs.digest }}"
          cat > "digest-${{ matrix.project }}.json" <<JSON
          {
            "project": "${{ matrix.project }}",
            "image": "${IMAGE_FULL}",
            "digest": "${DIGEST}"
          }
          JSON

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.project }}
          path: digest-${{ matrix.project }}.json
          if-no-files-found: error
          retention-days: 7

      # -- Group G G2 PR1: Trivy container vulnerability scan ------------
      # VERSION PIN: 0.59.1 (released 2025-07, stable SARIF + CycloneDX
      # output, widely used in GitHub Actions ecosystems).  The digest is
      # from ghcr.io/aquasecurity/trivy:0.59.1.
      - name: Trivy scan image
        id: trivy
        env:
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.project }}
          TRIVY_IMAGE: ghcr.io/aquasecurity/trivy:0.59.1
        run: |
          set -euo pipefail
          IMAGE_FULL="$(printf '%s' "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')@${{ steps.build-push.outputs.digest }}"
          echo "Scanning: ${IMAGE_FULL}"
          echo "Trivy:    ${TRIVY_IMAGE}"

          docker pull "${IMAGE_FULL}"

          # Pass 1: SARIF for all severities (report-only)
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd):/workspace" \
            -w /workspace \
            "${TRIVY_IMAGE}" \
            image \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --exit-code 0 \
            --format sarif \
            --output "trivy-results-${{ matrix.project }}.sarif" \
            "${IMAGE_FULL}"

          echo "Trivy SARIF written: trivy-results-${{ matrix.project }}.sarif"

          # Pass 2: JSON vulnerability report (artifact)
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd):/workspace" \
            -w /workspace \
            "${TRIVY_IMAGE}" \
            image \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --exit-code 0 \
            --format json \
            --output "trivy-results-${{ matrix.project }}.json" \
            "${IMAGE_FULL}"

          echo "Trivy JSON written: trivy-results-${{ matrix.project }}.json"

          # Pass 3: CycloneDX SBOM (report-only, before CRITICAL gate so the
          # SBOM artifact is always produced even when the gate fails).
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd):/workspace" \
            -w /workspace \
            "${TRIVY_IMAGE}" \
            image \
            --format cyclonedx \
            --output "sbom-${{ matrix.project }}.cdx.json" \
            "${IMAGE_FULL}"

          echo "SBOM written: sbom-${{ matrix.project }}.cdx.json"

          # Pass 4: actionable CRITICAL-only gate.
          # Fail only CRITICAL vulnerabilities with an upstream fix available.
          # Unfixed/fix_deferred CRITICAL CVEs remain visible in SARIF/JSON
          # artifacts and GitHub Security, but do not block main while the base
          # image vendor has no patched package.
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd):/workspace" \
            -w /workspace \
            "${TRIVY_IMAGE}" \
            image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --format table \
            "${IMAGE_FULL}"

      - name: Upload Trivy SARIF artifact
        if: always() && steps.trivy.outcome != 'skipped'
        uses: actions/upload-artifact@v7
        with:
          name: trivy-results-${{ matrix.project }}
          path: trivy-results-${{ matrix.project }}.sarif
          if-no-files-found: error
          retention-days: 30

      - name: Upload Trivy JSON artifact
        if: always() && steps.trivy.outcome != 'skipped'
        uses: actions/upload-artifact@v7
        with:
          name: trivy-json-${{ matrix.project }}
          path: trivy-results-${{ matrix.project }}.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload Trivy SARIF to GitHub Security
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.trivy.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results-${{ matrix.project }}.sarif
          category: trivy-${{ matrix.project }}

      # -- Group G G2 PR1: upload CycloneDX SBOM artifact ------------
      # SBOM is generated in Pass 3 of "Trivy scan image" (before the
      # CRITICAL gate) so it always exists even when the gate fails.
      - name: Upload SBOM artifact
        if: always() && steps.trivy.outcome != 'skipped'
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ matrix.project }}
          path: sbom-${{ matrix.project }}.cdx.json
          if-no-files-found: error
          retention-days: 30

  # -- Group G G2 PR1: PR-level Trivy scan (no push, load local image) --
  # Builds the image without pushing, loads it into the local Docker
  # daemon, and runs the same Trivy CRITICAL gate.  SARIF/JSON/SBOM
  # are uploaded as artifacts.  GitHub Security SARIF upload is reserved
  # for main push.
  security-scan:
    name: Security Scan (PR)
    runs-on: ubuntu-latest
    needs: [lint, lint-python]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      actions: read
    strategy:
      matrix:
        include:
          - project: gateway
            dockerfile: gateway/Dockerfile
            context: gateway
          - project: frontend
            dockerfile: frontend/Dockerfile
            context: frontend
          - project: agents
            dockerfile: agents/Dockerfile
            context: agents
          - project: migrate
            dockerfile: database/Dockerfile.migrate
            context: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: mecrm-${{ matrix.project }}:pr-${{ github.event.pull_request.head.sha || github.sha }}
          cache-from: type=gha
          # Do NOT cache-to on PR -- security boundary

      - name: Trivy scan PR image
        id: trivy
        env:
          TRIVY_IMAGE: ghcr.io/aquasecurity/trivy:0.59.1
        run: |
          set -euo pipefail
          IMAGE_TAG="mecrm-${{ matrix.project }}:pr-${{ github.event.pull_request.head.sha || github.sha }}"
          echo "Scanning local: ${IMAGE_TAG}"
          echo "Trivy:          ${TRIVY_IMAGE}"

          # Pass 1: SARIF (report-only)
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd):/workspace" \
            -w /workspace \
            "${TRIVY_IMAGE}" \
            image \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --exit-code 0 \
            --format sarif \
            --output "trivy-results-${{ matrix.project }}.sarif" \
            "${IMAGE_TAG}"

          # Pass 2: JSON (artifact)
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd):/workspace" \
            -w /workspace \
            "${TRIVY_IMAGE}" \
            image \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --exit-code 0 \
            --format json \
            --output "trivy-results-${{ matrix.project }}.json" \
            "${IMAGE_TAG}"

          # Pass 3: CycloneDX SBOM (report-only, before CRITICAL gate so the
          # SBOM artifact is always produced even when the gate fails).
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd):/workspace" \
            -w /workspace \
            "${TRIVY_IMAGE}" \
            image \
            --format cyclonedx \
            --output "sbom-${{ matrix.project }}.cdx.json" \
            "${IMAGE_TAG}"

          # Pass 4: actionable CRITICAL gate.
          # Fail only CRITICAL vulnerabilities with an upstream fix available.
          # Unfixed/fix_deferred CRITICAL CVEs remain visible in SARIF/JSON
          # artifacts, but do not block PRs while the base image vendor has no
          # patched package.
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$(pwd):/workspace" \
            -w /workspace \
            "${TRIVY_IMAGE}" \
            image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --format table \
            "${IMAGE_TAG}"

      - name: Upload Trivy SARIF artifact
        if: always() && steps.trivy.outcome != 'skipped'
        uses: actions/upload-artifact@v7
        with:
          name: trivy-results-${{ matrix.project }}-pr
          path: trivy-results-${{ matrix.project }}.sarif
          if-no-files-found: error
          retention-days: 14

      - name: Upload Trivy JSON artifact
        if: always() && steps.trivy.outcome != 'skipped'
        uses: actions/upload-artifact@v7
        with:
          name: trivy-json-${{ matrix.project }}-pr
          path: trivy-results-${{ matrix.project }}.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload SBOM artifact
        if: always() && steps.trivy.outcome != 'skipped'
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ matrix.project }}-pr
          path: sbom-${{ matrix.project }}.cdx.json
          if-no-files-found: error
          retention-days: 14

  # -- Group G G1: aggregate per-project digest artifacts into a single
  #    digest-map.json consumed by deploy-staging / deploy-production.
  #    Each matrix build uploads digest-{project}; this job downloads all
  #    three and produces the unified map.
  aggregate-digests:
    name: Aggregate Digests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          merge-multiple: true
          path: digests

      - name: Assemble digest map
        id: digest-map
        run: |
          set -euo pipefail

          REQUIRED_PROJECTS="gateway frontend agents migrate"
          for p in $REQUIRED_PROJECTS; do
            f="digests/digest-${p}.json"
            test -f "$f" || { echo "FATAL: missing digest artifact for $p" >&2; exit 1; }
            jq -e '.project == "'"$p"'"' "$f" >/dev/null 2>&1 || {
              echo "FATAL: digest-${p}.json project field is not '$p'" >&2; exit 1;
            }
            img="$(jq -r '.image' "$f")"
            dig="$(jq -r '.digest' "$f")"
            test -n "$img" || { echo "FATAL: digest-${p}.json image is empty" >&2; exit 1; }
            test -n "$dig" || { echo "FATAL: digest-${p}.json digest is empty" >&2; exit 1; }
            echo "$dig" | grep -qE '^sha256:[a-f0-9]{64}$' || {
              echo "FATAL: digest-${p}.json digest does not match ^sha256:[a-f0-9]{64}$: $dig" >&2; exit 1;
            }
          done

          echo '{' > digest-map.json
          first=true
          for p in $REQUIRED_PROJECTS; do
            f="digests/digest-${p}.json"
            img="$(jq -r '.image' "$f")"
            dig="$(jq -r '.digest' "$f")"
            if [ "$first" = "true" ]; then first=false; else echo ',' >> digest-map.json; fi
            printf '  "%s": {"image": "%s", "digest": "%s"}' "$p" "$img" "$dig" >> digest-map.json
          done
          echo '' >> digest-map.json
          echo '}' >> digest-map.json

          # Validate JSON is parsable
          jq empty digest-map.json || { echo "FATAL: digest-map.json is not valid JSON" >&2; exit 1; }
          cat digest-map.json

      - name: Upload digest map artifact
        uses: actions/upload-artifact@v7
        with:
          name: digest-map
          path: digest-map.json
          if-no-files-found: error
          retention-days: 7

  # Deploy to staging.
  # NOTE: job-level `if:` cannot reference the `secrets` context reliably
  # (`if: ${{ secrets.X != '' }}` does not evaluate as intended and makes the
  # job silently skip on every run). Instead we assign the secret to an env
  # var and guard it in the first step, so the job is skipped cleanly when the
  # secret is not configured (forks, repos without a staging cluster) but
  # actually runs when it is.
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: aggregate-digests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      KUBE_CONFIG_STAGING: ${{ secrets.KUBE_CONFIG_STAGING }}
      STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Download digest map
        uses: actions/download-artifact@v4
        with:
          name: digest-map
          path: /tmp/digest-map

      - name: Guard required staging secrets
        run: |
          if [ -z "${KUBE_CONFIG_STAGING}" ]; then
            echo "KUBE_CONFIG_STAGING not set; skipping staging deploy." >&2
            echo "SKIP_REMAINING=true" >> "$GITHUB_ENV"
          else
            echo "KUBE_CONFIG_STAGING is configured; continuing deploy."
            echo "SKIP_REMAINING=false" >> "$GITHUB_ENV"
          fi

      - name: Setup Helm
        if: ${{ env.SKIP_REMAINING != 'true' }}
        uses: azure/setup-helm@v5

      - name: Configure kubectl
        if: ${{ env.SKIP_REMAINING != 'true' }}
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ env.KUBE_CONFIG_STAGING }}

      - name: Deploy with Helm
        # Group G G1: deploy by immutable image digest + full repository.
        # The digest-map.json includes both 'image' (full registry path) and
        # 'digest' per project.  We override repository + digest together so
        # that {{ include "enterprise-crm.image" }} renders
        #    ghcr.io/dorring/mecrm/{gateway,frontend,agents}@sha256:...
        # instead of the default enterprise-crm/{service}@sha256:...
        if: ${{ env.SKIP_REMAINING != 'true' }}
        run: |
          GW_IMAGE=$(jq -r '.gateway.image' /tmp/digest-map/digest-map.json)
          GW_DIGEST=$(jq -r '.gateway.digest' /tmp/digest-map/digest-map.json)
          FE_IMAGE=$(jq -r '.frontend.image' /tmp/digest-map/digest-map.json)
          FE_DIGEST=$(jq -r '.frontend.digest' /tmp/digest-map/digest-map.json)
          AG_IMAGE=$(jq -r '.agents.image' /tmp/digest-map/digest-map.json)
          AG_DIGEST=$(jq -r '.agents.digest' /tmp/digest-map/digest-map.json)
          MG_IMAGE=$(jq -r '.migrate.image' /tmp/digest-map/digest-map.json)
          MG_DIGEST=$(jq -r '.migrate.digest' /tmp/digest-map/digest-map.json)
          helm upgrade --install enterprise-crm ./deploy/helm/enterprise-crm \
            --namespace crm-staging \
            --create-namespace \
            --values ./deploy/helm/enterprise-crm/values-staging.yaml \
            --set-string images.gateway.repository="${GW_IMAGE}" \
            --set-string images.gateway.digest="${GW_DIGEST}" \
            --set-string images.frontend.repository="${FE_IMAGE}" \
            --set-string images.frontend.digest="${FE_DIGEST}" \
            --set-string images.agents.repository="${AG_IMAGE}" \
            --set-string images.agents.digest="${AG_DIGEST}" \
            --set-string migration.image.repository="${MG_IMAGE}" \
            --set-string migration.image.digest="${MG_DIGEST}" \
            --wait --timeout 10m

  # Integration tests on staging. Runs only when the staging API is actually
  # configured; otherwise skipped cleanly (see deploy-staging note on why we
  # cannot use job-level `if: ${{ secrets.X != '' }}`).
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      STAGING_API_URL: ${{ secrets.STAGING_API_URL }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Guard required integration-test secrets
        run: |
          if [ -z "${STAGING_API_URL}" ] || [ -z "${TEST_USER_EMAIL}" ] || [ -z "${TEST_USER_PASSWORD}" ]; then
            echo "One or more integration-test secrets are not set; skipping integration tests." >&2
            echo "SKIP_REMAINING=true" >> "$GITHUB_ENV"
          else
            echo "Integration-test secrets are configured; continuing."
            echo "SKIP_REMAINING=false" >> "$GITHUB_ENV"
          fi

      - name: Setup Node.js
        if: ${{ env.SKIP_REMAINING != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: tests/integration/package-lock.json

      - name: Install test dependencies
        if: ${{ env.SKIP_REMAINING != 'true' }}
        run: |
          for i in 1 2 3; do
            npm ci && break || sleep $((i * 15))
          done
        working-directory: tests/integration

      - name: Run integration tests
        if: ${{ env.SKIP_REMAINING != 'true' }}
        run: npm test
        working-directory: tests/integration
        env:
          API_URL: ${{ env.STAGING_API_URL }}
          TEST_USER_EMAIL: ${{ env.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ env.TEST_USER_PASSWORD }}

  # Deploy to production (manual approval required via the `production`
  # environment protection rule). Same secrets-context note applies.
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      KUBE_CONFIG_PRODUCTION: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
    steps:
      - uses: actions/checkout@v4

      - name: Download digest map
        uses: actions/download-artifact@v4
        with:
          name: digest-map
          path: /tmp/digest-map

      - name: Guard required production secrets
        run: |
          if [ -z "${KUBE_CONFIG_PRODUCTION}" ]; then
            echo "KUBE_CONFIG_PRODUCTION not set; skipping production deploy." >&2
            echo "SKIP_REMAINING=true" >> "$GITHUB_ENV"
          else
            echo "KUBE_CONFIG_PRODUCTION is configured; continuing deploy."
            echo "SKIP_REMAINING=false" >> "$GITHUB_ENV"
          fi

      - name: Setup Helm
        if: ${{ env.SKIP_REMAINING != 'true' }}
        uses: azure/setup-helm@v5

      - name: Configure kubectl
        if: ${{ env.SKIP_REMAINING != 'true' }}
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ env.KUBE_CONFIG_PRODUCTION }}

      - name: Deploy with Helm
        # Group G G1: deploy by immutable image digest + full repository.
        # Same pattern as deploy-staging.
        if: ${{ env.SKIP_REMAINING != 'true' }}
        run: |
          GW_IMAGE=$(jq -r '.gateway.image' /tmp/digest-map/digest-map.json)
          GW_DIGEST=$(jq -r '.gateway.digest' /tmp/digest-map/digest-map.json)
          FE_IMAGE=$(jq -r '.frontend.image' /tmp/digest-map/digest-map.json)
          FE_DIGEST=$(jq -r '.frontend.digest' /tmp/digest-map/digest-map.json)
          AG_IMAGE=$(jq -r '.agents.image' /tmp/digest-map/digest-map.json)
          AG_DIGEST=$(jq -r '.agents.digest' /tmp/digest-map/digest-map.json)
          MG_IMAGE=$(jq -r '.migrate.image' /tmp/digest-map/digest-map.json)
          MG_DIGEST=$(jq -r '.migrate.digest' /tmp/digest-map/digest-map.json)
          helm upgrade --install enterprise-crm ./deploy/helm/enterprise-crm \
            --namespace crm-production \
            --create-namespace \
            --values ./deploy/helm/enterprise-crm/values-production.yaml \
            --set-string images.gateway.repository="${GW_IMAGE}" \
            --set-string images.gateway.digest="${GW_DIGEST}" \
            --set-string images.frontend.repository="${FE_IMAGE}" \
            --set-string images.frontend.digest="${FE_DIGEST}" \
            --set-string images.agents.repository="${AG_IMAGE}" \
            --set-string images.agents.digest="${AG_DIGEST}" \
            --set-string migration.image.repository="${MG_IMAGE}" \
            --set-string migration.image.digest="${MG_DIGEST}" \
            --wait --timeout 15m

      - name: Notify deployment
        if: ${{ env.SKIP_REMAINING != 'true' }}
        uses: slackapi/slack-github-action@v3.0.5
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🚀 Enterprise CRM deployed to production",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Enterprise CRM* deployed to production\nCommit: `${{ github.sha }}`\nBy: ${{ github.actor }}"
                  }
                }
              ]
            }
