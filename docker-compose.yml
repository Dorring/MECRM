services:
  # ===================
  # Edge proxy (nginx) — single entry point for browser traffic.
  # Routes: /api → gateway, /ws → gateway (WS upgrade), / → frontend.
  # Makes Compose semantically identical to K8s Ingress.
  # ===================
  frontend-proxy:
    image: nginx:1.27-alpine
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - gateway
    networks:
      - crm-network
    healthcheck:
      # Keep this check local to nginx config validation. The container process
      # itself proves nginx is running; `nginx -t` avoids CI false negatives from
      # BusyBox wget / localhost networking during cold startup.
      test: ["CMD-SHELL", "nginx -t >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # ===================
  # Frontend
  # ===================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # No host port — frontend is only accessed via frontend-proxy (nginx).
    # This prevents browsers from connecting directly to Next.js and ensures
    # the same-origin WS path (/ws) routes through the proxy.
    expose:
      - "3000"
    environment:
      # Server-side vars (NOT NEXT_PUBLIC_* — no API URL leaks into browser bundle)
      - GATEWAY_INTERNAL_URL=http://gateway:4000  # retained for Next dev fallback
      - WS_URL=                                    # empty: browser derives from window.location
      - API_URL=                                   # empty: browser uses same-origin relative paths
    depends_on:
      - gateway
    networks:
      - crm-network

  # ===================
  # API Gateway
  # ===================
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_PORT:-4000}:4000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=postgresql://crm_app:${CRM_APP_PASSWORD:?CRM_APP_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-enterprise_crm}
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - OPA_URL=${OPA_URL:-http://opa:8181}
      # JWT_SECRET must be provided via .env; missing secret fails startup (no default).
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      # Browser auth requests include Origin even when the frontend proxy keeps
      # API traffic same-origin. Keep a local default while allowing deployments
      # to supply an explicit comma-separated allowlist.
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - KEYCLOAK_URL=${KEYCLOAK_URL:-http://keycloak:8080}
      - REPLAY_SERVICE_URL=http://replay-service:5011
    volumes:
      - ./policies:/app/policies:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      opa:
        condition: service_healthy
    networks:
      - crm-network
    healthcheck:
      # Compose healthcheck is intentionally more conservative than the
      # Dockerfile (30s/10s/3/5s).  Gateway start_period is 30s instead of
      # 5s because Compose cold starts (all infra coming up) are slower than
      # pre-warmed Dockerfile restarts.  10 retries × 15s interval = up to
      # 150s of tolerance before marking unhealthy — generous but avoids
      # false restarts during slow Compose boot (Postgres + Redis + Kafka-init
      # + OPA healthy all in parallel).  The Dockerfile 3-retry 30s-interval
      # is tuned for a fast restart of an already-running container.
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ===================
  # Core Services
  # ===================
  # NOTE: The following domain services (leads/deals/tickets/customers) reference
  # build contexts that do not exist in the repository yet. They are intentionally
  # left commented out to avoid enabling empty services. Once ./services/<name>/
  # Dockerfiles are added, uncomment and wire them into the topology.
  # TODO: service implementation pending (leads-service)
  # leads-service:
  #   build:
  #     context: ./services/leads
  #     dockerfile: Dockerfile
  #   ports:
  #     - "${LEADS_SERVICE_PORT:-5001}:5001"
  #   environment:
  #     - DATABASE_URL=${DATABASE_URL}
  #     - REDIS_URL=${REDIS_URL}
  #     - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
  #     - OPA_URL=${OPA_URL:-http://opa:8181}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     kafka:
  #       condition: service_healthy
  #   networks:
  #     - crm-network

  # TODO: service implementation pending (deals-service)
  # deals-service:
  #   build:
  #     context: ./services/deals
  #     dockerfile: Dockerfile
  #   ports:
  #     - "${DEALS_SERVICE_PORT:-5002}:5002"
  #   environment:
  #     - DATABASE_URL=${DATABASE_URL}
  #     - REDIS_URL=${REDIS_URL}
  #     - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
  #     - OPA_URL=${OPA_URL:-http://opa:8181}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     kafka:
  #       condition: service_healthy
  #   networks:
  #     - crm-network

  # TODO: service implementation pending (tickets-service)
  # tickets-service:
  #   build:
  #     context: ./services/tickets
  #     dockerfile: Dockerfile
  #   ports:
  #     - "${TICKETS_SERVICE_PORT:-5003}:5003"
  #   environment:
  #     - DATABASE_URL=${DATABASE_URL}
  #     - REDIS_URL=${REDIS_URL}
  #     - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
  #     - OPA_URL=${OPA_URL:-http://opa:8181}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     kafka:
  #       condition: service_healthy
  #   networks:
  #     - crm-network

  # TODO: service implementation pending (customers-service)
  # customers-service:
  #   build:
  #     context: ./services/customers
  #     dockerfile: Dockerfile
  #   ports:
  #     - "${CUSTOMERS_SERVICE_PORT:-5004}:5004"
  #   environment:
  #     - DATABASE_URL=${DATABASE_URL}
  #     - REDIS_URL=${REDIS_URL}
  #     - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
  #     - OPA_URL=${OPA_URL:-http://opa:8181}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     kafka:
  #       condition: service_healthy
  #   networks:
  #     - crm-network

  # ===================
  # AI Agents
  # ===================
  agents:
    build:
      context: ./agents
      dockerfile: Dockerfile
    # Replaced fixed `sleep 30` with ordered, health-conditioned depends_on.
    # The orchestrator applies its own internal retry/backoff for Kafka/Weaviate,
    # so we only block on dependency readiness, not a fixed delay.
    # P0-5: must match agents/Dockerfile (PYTHONPATH=/app/src, CMD python -m orchestrator.main).
    command: ["python", "-m", "orchestrator.main"]
    ports:
      - "${AGENTS_PORT:-5010}:5010"
    environment:
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      # AI provider credentials are injected only into the server-side agents
      # container. Never add NVIDIA_API_KEY to frontend or gateway services.
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - AI_REQUEST_TIMEOUT_SECONDS=${AI_REQUEST_TIMEOUT_SECONDS:-30}
      - AI_MAX_RETRIES=${AI_MAX_RETRIES:-2}
      - NVIDIA_BASE_URL=${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NVIDIA_CHAT_MODEL=${NVIDIA_CHAT_MODEL:-}
      - NVIDIA_EMBED_MODEL=${NVIDIA_EMBED_MODEL:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - WEAVIATE_URL=${WEAVIATE_URL:-http://weaviate:8080}
      - OPA_URL=${OPA_URL:-http://opa:8181}
      - DATABASE_URL=postgresql://crm_app:${CRM_APP_PASSWORD:?CRM_APP_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-enterprise_crm}
      - GATEWAY_URL=http://gateway:4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      weaviate:
        condition: service_healthy
      opa:
        condition: service_healthy
    networks:
      - crm-network
    healthcheck:
      # P0-6: check the response status code, not just that the request completed.
      # Matches the Dockerfile HEALTHCHECK semantics (interval=30s, timeout=10s,
      # start_period=10s, retries=3).
      # Uses only httpx which is already a runtime dependency.
      test: ["CMD-SHELL", "python -c \"import httpx,sys; r=httpx.get('http://localhost:5010/health'); sys.exit(0 if r.is_success else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Replay service: implementation exists at agents/src/replay/{api,event_ingestor,...}.
  # Enabled. Uses the agents image and runs the FastAPI replay API on :5011.
  replay-service:
    build:
      context: ./agents
      dockerfile: Dockerfile
    command: ["uvicorn", "replay.api:app", "--host", "0.0.0.0", "--port", "5011"]
    ports:
      - "${REPLAY_SERVICE_PORT:-5011}:5011"
    environment:
      - DATABASE_URL=${REPLAY_DATABASE_URL:-postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_password}@postgres:5432/${POSTGRES_DB:-enterprise_crm}}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - ENABLE_REPLAY_INGESTOR=${ENABLE_REPLAY_INGESTOR:-true}
      - REPLAY_INGESTOR_GROUP=${REPLAY_INGESTOR_GROUP:-replay-event-ingestor}
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - crm-network
    healthcheck:
      # P0-6: check status code, not just that the request completed.
      # httpx.get() returns even on HTTP 500; a 5xx endpoint must be marked unhealthy.
      test: ["CMD-SHELL", "python -c \"import httpx,sys; r=httpx.get('http://localhost:5011/health'); sys.exit(0 if r.is_success else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


  # ===================
  # Infrastructure
  # ===================
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-crm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-crm_password}
      - POSTGRES_DB=${POSTGRES_DB:-enterprise_crm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - crm-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-crm_user} -d ${POSTGRES_DB:-enterprise_crm}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_password}@postgres:5432/${POSTGRES_DB:-enterprise_crm}?sslmode=disable
    depends_on:
      - postgres
    networks:
      - crm-network

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "always", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - crm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-exporter:
    image: oliver006/redis_exporter:v1.82.0
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      - redis
    networks:
      - crm-network

  # Kafka with KRaft (no Zookeeper)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - crm-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server localhost:9092",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # One-shot topic initialization (ADR-001).
  # Creates all CRM topics explicitly and waits for partition leaders before
  # allowing gateway/agents to start. Runs with the same Kafka image so no
  # extra image is pulled.
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    entrypoint: ["bash", "/scripts/kafka-init.sh"]
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_REPLICATION_FACTOR=${KAFKA_REPLICATION_FACTOR:-1}
      - KAFKA_DEFAULT_RETENTION_MS=${KAFKA_DEFAULT_RETENTION_MS:-604800000}
      - KAFKA_AUDIT_RETENTION_MS=${KAFKA_AUDIT_RETENTION_MS:-2592000000}
      - KAFKA_DLQ_RETENTION_MS=${KAFKA_DLQ_RETENTION_MS:-1209600000}
      - KAFKA_LEADER_TIMEOUT=${KAFKA_LEADER_TIMEOUT:-120}
      - KAFKA_LEADER_INTERVAL=${KAFKA_LEADER_INTERVAL:-2}
    volumes:
      - ./scripts/kafka-init.sh:/scripts/kafka-init.sh:ro
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - crm-network

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    command:
      - "--kafka.server=kafka:9092"
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - crm-network

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=enterprise-crm
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - crm-network

  # ===================
  # Policy Engine
  # ===================
  opa:
    image: openpolicyagent/opa:0.70.0
    ports:
      - "8181:8181"
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "/policies"
    volumes:
      - ./policies:/policies
    networks:
      - crm-network
    healthcheck:
      # The minimal OPA image does not include wget/curl. Use OPA itself to
      # verify the binary is runnable and all mounted policies compile.
      test: ["CMD", "/opa", "eval", "--data", "/policies", "--fail", "--format=discard", "true"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ===================
  # AI/LLM
  # ===================
  # Ollama: defaults to NVIDIA GPU via deploy.resources.devices.
  # On machines WITHOUT an NVIDIA GPU, this reservation makes the container fail
  # to start with Docker's default runtime. CPU-mode alternatives:
  #   1) Comment out the entire `deploy.resources` block below to run on CPU, or
  #   2) Install the NVIDIA Container Toolkit only where GPUs are available, and
  #      drive this profile via an override file (e.g. docker-compose.gpu.yml).
  # CPU mode is significantly slower for llama3.1 and not recommended for production.
  ollama:
    # Profile-gated local-llm image. Pinning eliminates :latest drift;
    # does NOT run or validate model capability. No AI provider migration
    # is implied — this is a pure Compose reproducibility fix.
    image: ollama/ollama:0.22.1
    # Local inference is optional. The default stack does not pull or start the
    # multi-gigabyte Ollama image; enable explicitly with:
    #   docker compose --profile local-llm up -d ollama
    profiles: ["local-llm"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - crm-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    # GPU reservation (NVIDIA only). See CPU-mode note above.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  weaviate:
    image: semitechnologies/weaviate:1.23.0
    ports:
      - "8082:8080"
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
      - CLUSTER_HOSTNAME=node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - crm-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/v1/.well-known/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ===================
  # Authentication
  # ===================
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    ports:
      - "8081:8080"
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required (set in .env)}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-enterprise_crm}
      - KC_DB_USERNAME=${POSTGRES_USER:-crm_user}
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD:-crm_password}
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crm-network

  # One-shot migration runner (single, complete)
  # Runs the FULL migration sequence in fixed order and exits:
  #   1. npx prisma migrate deploy   (application tables)
  #   2. raw SQL 00-12               (advisory lock doc, RLS policies, event store,
  #                                   outbox, read models, twins, type convergence)
  #   3. drift + RLS enforcement audit (fails if tenant tables missing ENABLE+FORCE+ALL policy)
  # Uses scripts/migrate.sh which holds a session-level advisory lock for the entire
  # runner lifetime and releases it via trap/finally.
  # Usage: docker-compose --profile migrate run --rm migrate
  migrate:
    build:
      context: .
      dockerfile: database/Dockerfile.migrate
    command: ["bash", "/scripts/migrate.sh"]
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-crm_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-crm_password}
      - POSTGRES_DB=${POSTGRES_DB:-enterprise_crm}
      - CRM_APP_PASSWORD=${CRM_APP_PASSWORD:?CRM_APP_PASSWORD is required}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_password}@postgres:5432/${POSTGRES_DB:-enterprise_crm}
      - GATEWAY_DIR=/app
    volumes:
      - ./database/migrations:/database/migrations:ro
      - ./scripts/migrate.sh:/scripts/migrate.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crm-network
    profiles: ["migrate"]

  # ===================
  # Gateway test runner (profile: test)
  # ===================
  # The gateway PRODUCTION image (final stage) runs `npm ci --omit=dev` and does
  # not COPY test source, so `docker compose exec gateway npm test` cannot run
  # Jest. This service builds the `builder` stage (full devDependencies + test
  # source + generated Prisma client) and runs the Jest suite against the live
  # postgres/redis. DB-dependent suites (RLS enforcement, CRUD) run here with
  # CRM_TEST_REQUIRE_DB=1 (jest.setup.ts maps it to CRM_DB_AVAILABLE=1).
  # Usage: docker-compose --profile test run --rm test-gateway
  test-gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
      target: builder
    command: ["sh", "-c", "npm test"]
    environment:
      - NODE_ENV=test
      - CRM_TEST_REQUIRE_DB=1
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_password}@postgres:5432/${POSTGRES_DB:-enterprise_crm}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - OPA_URL=${OPA_URL:-http://opa:8181}
    volumes:
      - ./policies:/app/policies:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - crm-network
    profiles: ["test"]

  # ===================
  # Observability
  # ===================
  prometheus:
    image: prom/prometheus:v3.5.2
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./observability/alerts:/etc/prometheus/alerts
      - prometheus_data:/prometheus
    networks:
      - crm-network

  grafana:
    image: grafana/grafana:13.0.2
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required (set in .env)}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - crm-network

  loki:
    image: grafana/loki:3.7.3
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    networks:
      - crm-network

  # ===================
  # Smoke test profile
  # ===================
  # Activate with: docker-compose --profile smoke-test run --rm smoke-test
  #
  # REAL smoke test: register tenant+user -> login -> create lead -> list leads
  # -> assert 401 without token. Runs scripts/smoke-test.sh in a curl-enabled
  # image. The script is the single source of truth (also runnable on the host
  # via scripts/smoke-test.ps1). Exit code propagates via --exit-code-from.
  # NOTE: this verifies the request path (auth, tenant isolation, CRUD). It does
  # NOT verify async event projection -- the Lead route still publishes directly
  # to Kafka and the Outbox Publisher is not yet wired into Compose. Outbox /
  # projection verification is an Iteration 3 exit criterion, NOT Batch 1.
  smoke-test:
    image: alpine:3.19
    entrypoint: ["sh", "-c", "apk add --no-cache curl >/dev/null 2>&1 && sh /scripts/smoke-test.sh http://gateway:4000"]
    volumes:
      - ./scripts/smoke-test.sh:/scripts/smoke-test.sh:ro
    depends_on:
      gateway:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - crm-network
    profiles: ["smoke-test"]

  # ===================
  # WebSocket proxy smoke test profile
  # ===================
  # Activate with: docker-compose --profile ws-proxy-test run --rm ws-proxy-test
  #
  # Validates the C4 same-origin /ws upgrade proxy path end-to-end:
  #   1. Register tenant+user through the edge proxy
  #   2. Login → get accessToken + cookies (csrf_token, refresh_token)
  #   3. POST /api/v1/auth/ws-ticket (with auth + CSRF headers + cookies)
  #   4. WebSocket ws://frontend-proxy/ws?ticket=<valid> → expect connected
  #   5. Reuse same ticket → expect 4401 close
  #   6. Invalid ticket → expect 4401 close
  #
  # Uses the gateway Docker image (has ws in production deps, Node.js 20).
  # NODE_PATH ensures require('ws') resolves from the gateway node_modules.
  ws-proxy-test:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    entrypoint: ["node", "/scripts/ws-proxy-test.js", "http://frontend-proxy"]
    environment:
      - NODE_PATH=/app/node_modules
    volumes:
      - ./scripts/ws-proxy-test.js:/scripts/ws-proxy-test.js:ro
    depends_on:
      frontend-proxy:
        condition: service_healthy
      gateway:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - crm-network
    profiles: ["ws-proxy-test"]

networks:
  crm-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  ollama_data:
  weaviate_data:
  prometheus_data:
  grafana_data:
  loki_data:
