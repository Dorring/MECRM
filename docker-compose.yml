version: "3.8"

services:
  # ===================
  # Frontend
  # ===================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:4000}
    depends_on:
      - gateway
    networks:
      - crm-network

  # ===================
  # API Gateway
  # ===================
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_PORT:-4000}:4000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - OPA_URL=${OPA_URL:-http://opa:8181}
      # JWT_SECRET must be provided via .env; missing secret fails startup (no default).
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - KEYCLOAK_URL=${KEYCLOAK_URL:-http://keycloak:8080}
      - REPLAY_SERVICE_URL=http://replay-service:5011
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      opa:
        condition: service_started
    networks:
      - crm-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ===================
  # Core Services
  # ===================
