  #   ports:
  #     - "${CUSTOMERS_SERVICE_PORT:-5004}:5004"
  #   environment:
  #     - DATABASE_URL=${DATABASE_URL}
  #     - REDIS_URL=${REDIS_URL}
  #     - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
  #     - OPA_URL=${OPA_URL:-http://opa:8181}
