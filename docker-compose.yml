  # TODO: service implementation pending (tickets-service)
  # tickets-service:
  #   build:
  #     context: ./services/tickets
  #     dockerfile: Dockerfile
  #   ports:
  #     - "${TICKETS_SERVICE_PORT:-5003}:5003"
  #   environment:
  #     - DATABASE_URL=${DATABASE_URL}
  #     - REDIS_URL=${REDIS_URL}
  #     - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
  #     - OPA_URL=${OPA_URL:-http://opa:8181}
  #   depends_on:
