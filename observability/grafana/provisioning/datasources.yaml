apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: crm
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        isDefault: true
        access: proxy

      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy

  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        folder: 'Enterprise CRM'
        type: file
        options:
          path: /var/lib/grafana/dashboards
