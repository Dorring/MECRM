events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream frontend_upstream {
    server frontend:3000;
  }

  upstream gateway_upstream {
    server gateway:4000;
  }

  server {
    listen 80;
    client_max_body_size 100m;

    # Health check endpoint for Docker Compose healthcheck.
    # Returns 200 immediately so depends_on can use service_healthy.
    location = /health {
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    # WebSocket: proxy to Gateway with Upgrade support.
    location /ws {
      proxy_pass http://gateway_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_buffering off;
    }

    # Runtime config remains served by Next.js. It returns server-side runtime
    # values and falls back to same-origin defaults when API_URL/WS_URL are empty.
    location = /api/config {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API: proxy directly to Gateway (bypass Next.js rewrites).
    location /api/ {
      proxy_pass http://gateway_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else: frontend (Next.js).
    location / {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
